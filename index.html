<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wolfgang Schmidt – WWS Advisory</title>
  <meta name="description" content="Wolfgang Schmidt – Bundesminister a.D. | WWS Advisory" />
  <link rel="canonical" href="https://wws-advisory.de/" />
  <link rel="alternate" hreflang="de" href="https://wws-advisory.de/" />
  <link rel="alternate" hreflang="en" href="https://wwsadvisory.com/" />
  <link rel="icon" type="image/svg+xml" href="img/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #2d4a5e;
      font-family: 'Lato', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* Hero fullscreen */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 500px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: left center;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        transparent 25%,
        rgba(30,51,69,0.2) 55%,
        rgba(30,51,69,0.55) 100%
      );
    }

    /* Logo top-left */
    .logo {
      position: absolute;
      top: 28px; left: 40px;
      z-index: 10;
    }
    .logo img { height: 64px; width: auto; }

    /* Name bottom-right */
    .hero-text {
      position: absolute;
      bottom: 60px; right: 60px;
      text-align: right;
      z-index: 10;
    }
    .hero-firstname {
      font-size: clamp(52px, 8vw, 113px);
      font-weight: 300;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
      display: block;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }
    .hero-lastname {
      font-size: clamp(66px, 10vw, 142px);
      font-weight: 900;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 0.92;
      display: block;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
    }
    .hero-title {
      font-size: clamp(20px, 3vw, 45px);
      font-weight: 400;
      color: #ffffff;
      margin-top: 8px;
      display: block;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s forwards;
    }

    /* Social icons top-right */
    .social {
      position: absolute;
      top: 28px; right: 40px;
      display: flex;
      gap: 16px;
      z-index: 10;
      opacity: 0;
      animation: fadeUp 0.8s 0.8s forwards;
    }
    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.2s;
    }
    .social a:hover {
      background: rgba(255,255,255,0.35);
    }
    .social svg {
      width: 18px; height: 18px;
      fill: #ffffff;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .hero-text { right: 24px; bottom: 80px; left: 24px; }
      .social { right: 24px; top: 20px; }
      .logo { left: 24px; top: 20px; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <img class="hero-bg" src="img/hero.webp" alt="Wolfgang Schmidt" />
    <div class="hero-overlay"></div>

    <a class="logo" href="https://www.schmidt-hamburg.de" target="_blank" rel="noopener">
      <img src="img/logo.svg" alt="WS" />
    </a>

    <div class="hero-text">
      <span class="hero-firstname">Wolfgang</span>
      <span class="hero-lastname">Schmidt</span>
      <span class="hero-title">Bundesminister a.D.</span>
    </div>

    <div class="social">
      <a href="https://www.linkedin.com/in/wolfgang-schmidt-germany" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>
      </a>

        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>

        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
      </a>
    </div>
  </section>

</body>
</html>
